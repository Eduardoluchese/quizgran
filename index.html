    const firstSection = document.querySelector(".quiz-section");
    if (firstSection && firstSection.id) {
      showSection(firstSection.id);
      dataSent = false;
    }
  });

  document.querySelectorAll(".mobile-button").forEach(function (button) {
    const hoverColor = button.getAttribute("data-hover-color");
    if (hoverColor) button.style.setProperty("--hover-color", hoverColor);
  });

  function initButtonSounds() {
    document.querySelectorAll('.mobile-button[data-sound]').forEach(function(btn) {
      var soundType = btn.getAttribute('data-sound');
      if (!soundType || soundType === 'none') return;
      var volume = parseInt(btn.getAttribute('data-sound-volume') || '50') / 100;
      var customUrl = btn.getAttribute('data-sound-url') || '';
      if (soundType === 'custom' && customUrl) {
        var preloaded = new Audio(customUrl);
        preloaded.preload = 'auto';
        preloaded.volume = volume;
        preloaded.load();
        btn._preloadedAudio = preloaded;
      }
      btn.addEventListener('click', function() {
        if (soundType === 'custom' && btn._preloadedAudio) {
          var a = btn._preloadedAudio;
          a.volume = volume;
          a.currentTime = 0;
          a.play().catch(function(){});
        } else {
          playButtonSound(soundType, volume);
        }
      });
    });
  }
  function playButtonSound(type, vol) {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var sounds = {
      click: [{f:800,d:0.06}],
      pop: [{f:400,d:0.08},{f:600,d:0.06}],
      success: [{f:523,d:0.2},{f:784,d:0.3}],
      celebration: [{f:523,d:0.2},{f:659,d:0.2},{f:784,d:0.2},{f:1047,d:0.3}],
      whoosh: [{f:200,d:0.05},{f:800,d:0.15}],
      coin: [{f:987,d:0.1},{f:1319,d:0.15}],
      money: [{f:1319,d:0.08},{f:1568,d:0.08},{f:1760,d:0.06},{f:2093,d:0.12}],
      notification: [{f:880,d:0.12},{f:1100,d:0.12}]
    };
    var notes = sounds[type] || sounds.click;
    var t = ctx.currentTime;
    notes.forEach(function(n) {
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(n.f, t);
      gain.gain.setValueAtTime(vol * 0.15, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + n.d);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(t);
      osc.stop(t + n.d + 0.05);
      t += n.d * 0.8;
    });
  }
  initButtonSounds();

  // Preload: adiciona enablejsapi a todos os iframes em background
  // para que ao clicar play, o postMessage funcione instantaneamente
  function preloadAllVideos() {
    document.querySelectorAll(".mobile-video iframe").forEach(function(iframe) {
      if (iframe._preloaded) return;
      iframe._preloaded = true;
      var src = iframe.src;
      if (src && !src.includes("enablejsapi=1")) {
        iframe.src = src + "&enablejsapi=1";
      }
    });
  }
  // Inicia preload 500ms após a página carregar (em background, não afeta UX)
  setTimeout(preloadAllVideos, 500);

  function initializeVideo(videoDiv) {
    var uniqueId = videoDiv.id.split("-")[1];
    var startOverlay = videoDiv.querySelector('[id^="start-overlay"]');
    var pauseOverlay = videoDiv.querySelector('[id^="pause-overlay"]');
    var blurBg = videoDiv.querySelector('[id^="blur-bg"]');
    var iframe = videoDiv.querySelector("iframe");
    var container = videoDiv.querySelector(".video-container");
    if (!iframe || videoDiv._initialized) return;
    videoDiv._initialized = true;

    // Forçar overlays visíveis no início
    if (startOverlay) { startOverlay.style.display = "flex"; startOverlay.style.zIndex = "200"; }
    if (blurBg) { blurBg.style.display = "block"; blurBg.style.zIndex = "199"; }
    if (pauseOverlay) { pauseOverlay.style.display = "none"; }
    // iframe sem interação direta - controle via overlays
    iframe.style.pointerEvents = "none";

    // Garantir enablejsapi no iframe (caso preload ainda não tenha rodado)
    var src = iframe.src;
    if (src && !src.includes("enablejsapi=1")) {
      iframe.src = src + "&enablejsapi=1";
    }

    var isVideoPlaying = false;

    function postCmd(cmd) {
      try { iframe.contentWindow.postMessage(JSON.stringify({event:"command",func:cmd,args:""}), "*"); } catch(e) {}
    }

    function play() {
      isVideoPlaying = true;
      if (startOverlay) startOverlay.style.display = "none";
      if (pauseOverlay) pauseOverlay.style.display = "none";
      if (blurBg) blurBg.style.display = "none";
      postCmd("playVideo");

      // Marcar tempo de início para botões vinculados
      videoDiv._playStartTime = Date.now();
      videoTimes.set(uniqueId, 0);
      if (!videoDiv._timeInterval) {
        videoDiv._timeInterval = setInterval(function() {
          if (videoDiv._playStartTime) {
            var elapsed = (Date.now() - videoDiv._playStartTime) / 1000;
            videoTimes.set(uniqueId, elapsed);
          }
        }, 500);
      }
    }

    function pause() {
      isVideoPlaying = false;
      if (pauseOverlay) pauseOverlay.style.display = "flex";
      if (blurBg) blurBg.style.display = "block";
      postCmd("pauseVideo");
    }

    // Click no start overlay: play
    if (startOverlay) startOverlay.onclick = function(e) { e.stopPropagation(); play(); };
    // Click no pause overlay: retomar
    if (pauseOverlay) pauseOverlay.onclick = function(e) { e.stopPropagation(); play(); };
    // Click no container (área do vídeo): pausar
    if (container) {
      container.addEventListener("click", function(e) {
        if (e.target.closest(".overlay")) return;
        e.stopPropagation();
        if (isVideoPlaying) pause();
      });
    }
  }

  function initVideosInSection(section) {
    if (!section) return;
    section.querySelectorAll(".mobile-video").forEach(initializeVideo);
  }

  // Botões vinculados ao vídeo: mostrar após X segundos
  function initVideoLinkedButtons() {
    var buttons = document.querySelectorAll("[data-video-trigger]");
    if (!buttons.length) return;
    setInterval(function() {
      buttons.forEach(function(btn) {
        var uid = btn.getAttribute("data-video-trigger").replace("video-", "");
        var triggerTime = parseFloat(btn.getAttribute("data-video-time") || "0");
        var ct = videoTimes.get(uid);
        if (ct !== undefined && ct >= triggerTime && !btn.classList.contains("video-btn-visible")) {
          btn.classList.add("video-btn-visible");
          btn.style.display = "";
          btn.style.opacity = "0";
          setTimeout(function(){ btn.style.opacity = "1"; }, 50);
        }
      });
    }, 500);
  }

  // Observer para inicializar vídeos quando seção fica ativa
  var videoObserver = new MutationObserver(function(mutations) {
    mutations.forEach(function(m) {
      if (m.target.classList && m.target.classList.contains("active")) {
        initVideosInSection(m.target);
      }
    });
  });
  document.querySelectorAll(".quiz-section").forEach(function(s) {
    videoObserver.observe(s, { attributes: true, attributeFilter: ["class"] });
  });
  // Inicializa handlers de todos os vídeos
  setTimeout(function() {
    document.querySelectorAll(".mobile-video").forEach(initializeVideo);
  }, 1000);
  initVideoLinkedButtons();
</script>
